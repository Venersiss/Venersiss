<svg xmlns="http://www.w3.org/2000/svg" width="800" height="280" viewBox="0 0 800 280" shape-rendering="crispEdges">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
      .label { font-family: 'Press Start 2P', monospace; font-size: 10px; fill: #e94560; }
      .value { font-family: 'Press Start 2P', monospace; font-size: 10px; fill: #00ff41; }
      .heading { font-family: 'Press Start 2P', monospace; font-size: 13px; fill: #ffcd75; }
      .quote { font-family: 'Press Start 2P', monospace; font-size: 8px; fill: #73eff7; }
      .mission-label { font-family: 'Press Start 2P', monospace; font-size: 9px; fill: #ef7d57; }
      .mission-val { font-family: 'Press Start 2P', monospace; font-size: 9px; fill: #00ff41; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
      .pulse { animation: pulse 2s infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="280" fill="#0d1117"/>
  
  <!-- Outer pixel border -->
  <rect x="20" y="10" width="760" height="260" fill="none" stroke="#533483" stroke-width="4"/>
  <rect x="24" y="14" width="752" height="252" fill="none" stroke="#1a1a2e" stroke-width="2"/>
  <rect x="28" y="18" width="744" height="244" fill="none" stroke="#e94560" stroke-width="2"/>
  
  <!-- Inner panel background -->
  <rect x="30" y="20" width="740" height="240" fill="#0a0e17" opacity="0.8"/>
  
  <!-- Header bar -->
  <rect x="30" y="20" width="740" height="28" fill="#1a1a2e"/>
  <rect x="30" y="48" width="740" height="2" fill="#e94560"/>
  
  <!-- Pixel art character icon -->
  <g transform="translate(50, 24)">
    <rect x="6" y="0" width="4" height="4" fill="#ffcd75"/>
    <rect x="10" y="0" width="4" height="4" fill="#ffcd75"/>
    <rect x="2" y="4" width="4" height="4" fill="#ffcd75"/>
    <rect x="6" y="4" width="4" height="4" fill="#ef7d57"/>
    <rect x="10" y="4" width="4" height="4" fill="#ef7d57"/>
    <rect x="14" y="4" width="4" height="4" fill="#ffcd75"/>
    <rect x="6" y="8" width="4" height="4" fill="#73eff7"/>
    <rect x="10" y="8" width="4" height="4" fill="#73eff7"/>
    <rect x="2" y="12" width="4" height="4" fill="#73eff7"/>
    <rect x="6" y="12" width="4" height="4" fill="#00ff41"/>
    <rect x="10" y="12" width="4" height="4" fill="#00ff41"/>
    <rect x="14" y="12" width="4" height="4" fill="#73eff7"/>
    <rect x="4" y="16" width="4" height="4" fill="#ef7d57"/>
    <rect x="12" y="16" width="4" height="4" fill="#ef7d57"/>
  </g>
  
  <!-- Header text -->
  <text x="90" y="40" class="heading">PLAYER STATS</text>
  
  <!-- Decorative pixels in header -->
  <rect x="720" y="28" width="6" height="6" fill="#e94560" class="pulse"/>
  <rect x="732" y="28" width="6" height="6" fill="#00ff41"/>
  <rect x="744" y="28" width="6" height="6" fill="#ffcd75"/>
  
  <!-- Stats content -->
  <text x="60" y="80" class="label">PILOT</text>
  <text x="200" y="80" class="value">Ivan Kent Custodio</text>
  
  <text x="60" y="105" class="label">CLASS</text>
  <text x="200" y="105" class="value">Computer Engineering</text>
  
  <text x="60" y="130" class="label">BASE</text>
  <text x="200" y="130" class="value">Digos City, Davao del Sur</text>
  
  <text x="60" y="155" class="label">ACADEMY</text>
  <text x="200" y="155" class="value">Cor Jesu College (2022-2026)</text>
  
  <!-- Separator line -->
  <rect x="50" y="170" width="700" height="1" fill="#533483"/>
  <rect x="50" y="173" width="700" height="1" fill="#1a1a2e"/>
  
  <!-- Active mission with blinking indicator -->
  <rect x="56" y="185" width="8" height="8" fill="#e94560" class="pulse"/>
  <text x="75" y="193" class="mission-label">ACTIVE MISSION</text>
  <text x="280" y="193" class="mission-val">Exploring AI Automation</text>
  
  <!-- Quote box -->
  <rect x="50" y="210" width="700" height="44" fill="#0f1923" stroke="#533483" stroke-width="2"/>
  <rect x="52" y="212" width="696" height="40" fill="none" stroke="#1a1a2e" stroke-width="1"/>
  <text x="70" y="230" class="quote">"I build things that detect road defects from drones,</text>
  <text x="70" y="245" class="quote"> track stolen bicycles, and count rebars automatically."</text>
  
  <!-- Small diamond decorations -->
  <rect x="56" y="228" width="4" height="4" fill="#ffcd75" transform="rotate(45,58,230)"/>
</svg>
