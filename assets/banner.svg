<svg xmlns="http://www.w3.org/2000/svg" width="800" height="250" viewBox="0 0 800 250" shape-rendering="crispEdges">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
      .title { font-family: 'Press Start 2P', monospace; font-size: 28px; fill: #00ff41; }
      .subtitle { font-family: 'Press Start 2P', monospace; font-size: 10px; fill: #e94560; }
      .star { fill: #ffffff; }
      .star-dim { fill: #533483; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
      @keyframes twinkle { 0%,100%{opacity:0.2} 50%{opacity:1} }
      .blink { animation: blink 1.5s infinite; }
      .twinkle1 { animation: twinkle 2s infinite; }
      .twinkle2 { animation: twinkle 3s infinite 0.5s; }
      .twinkle3 { animation: twinkle 2.5s infinite 1s; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="250" fill="#0d1117"/>
  
  <!-- Pixel border -->
  <rect x="0" y="0" width="800" height="4" fill="#533483"/>
  <rect x="0" y="4" width="800" height="4" fill="#e94560"/>
  <rect x="0" y="246" width="800" height="4" fill="#e94560"/>
  <rect x="0" y="242" width="800" height="4" fill="#533483"/>
  <rect x="0" y="0" width="4" height="250" fill="#533483"/>
  <rect x="4" y="0" width="4" height="250" fill="#e94560"/>
  <rect x="796" y="0" width="4" height="250" fill="#533483"/>
  <rect x="792" y="0" width="4" height="250" fill="#e94560"/>
  
  <!-- Corner pixels -->
  <rect x="8" y="8" width="8" height="8" fill="#e94560"/>
  <rect x="16" y="8" width="8" height="4" fill="#e94560"/>
  <rect x="8" y="16" width="4" height="8" fill="#e94560"/>
  <rect x="784" y="8" width="8" height="8" fill="#e94560"/>
  <rect x="776" y="8" width="8" height="4" fill="#e94560"/>
  <rect x="788" y="16" width="4" height="8" fill="#e94560"/>
  <rect x="8" y="234" width="8" height="8" fill="#e94560"/>
  <rect x="16" y="238" width="8" height="4" fill="#e94560"/>
  <rect x="8" y="226" width="4" height="8" fill="#e94560"/>
  <rect x="784" y="234" width="8" height="8" fill="#e94560"/>
  <rect x="776" y="238" width="8" height="4" fill="#e94560"/>
  <rect x="788" y="226" width="4" height="8" fill="#e94560"/>

  <!-- Stars -->
  <rect x="50" y="30" width="3" height="3" class="star twinkle1"/>
  <rect x="120" y="60" width="2" height="2" class="star twinkle2"/>
  <rect x="200" y="25" width="3" height="3" class="star twinkle3"/>
  <rect x="300" y="45" width="2" height="2" class="star twinkle1"/>
  <rect x="450" y="28" width="3" height="3" class="star twinkle2"/>
  <rect x="550" y="55" width="2" height="2" class="star twinkle3"/>
  <rect x="650" y="35" width="3" height="3" class="star twinkle1"/>
  <rect x="700" y="65" width="2" height="2" class="star twinkle2"/>
  <rect x="100" y="200" width="2" height="2" class="star twinkle3"/>
  <rect x="250" y="210" width="3" height="3" class="star twinkle1"/>
  <rect x="500" y="195" width="2" height="2" class="star twinkle2"/>
  <rect x="680" y="205" width="3" height="3" class="star twinkle3"/>
  <rect x="750" y="190" width="2" height="2" class="star twinkle1"/>
  <rect x="380" y="200" width="2" height="2" class="star-dim"/>
  <rect x="160" y="180" width="2" height="2" class="star-dim"/>
  <rect x="600" y="220" width="2" height="2" class="star-dim"/>
  <rect x="80" y="90" width="2" height="2" class="star-dim"/>
  <rect x="720" y="100" width="2" height="2" class="star-dim"/>

  <!-- Pixel art spaceship (small, top-right area) -->
  <g transform="translate(680, 80)">
    <rect x="12" y="0" width="4" height="4" fill="#73eff7"/>
    <rect x="8" y="4" width="4" height="4" fill="#73eff7"/>
    <rect x="12" y="4" width="4" height="4" fill="#ffffff"/>
    <rect x="16" y="4" width="4" height="4" fill="#73eff7"/>
    <rect x="4" y="8" width="4" height="4" fill="#533483"/>
    <rect x="8" y="8" width="4" height="4" fill="#ffffff"/>
    <rect x="12" y="8" width="4" height="4" fill="#73eff7"/>
    <rect x="16" y="8" width="4" height="4" fill="#ffffff"/>
    <rect x="20" y="8" width="4" height="4" fill="#533483"/>
    <rect x="0" y="12" width="4" height="4" fill="#e94560"/>
    <rect x="4" y="12" width="4" height="4" fill="#533483"/>
    <rect x="8" y="12" width="4" height="4" fill="#73eff7"/>
    <rect x="12" y="12" width="4" height="4" fill="#ffffff"/>
    <rect x="16" y="12" width="4" height="4" fill="#73eff7"/>
    <rect x="20" y="12" width="4" height="4" fill="#533483"/>
    <rect x="24" y="12" width="4" height="4" fill="#e94560"/>
    <rect x="0" y="16" width="4" height="4" fill="#ef7d57"/>
    <rect x="24" y="16" width="4" height="4" fill="#ef7d57"/>
  </g>

  <!-- Pixel art small planet (left area) -->
  <g transform="translate(60, 100)">
    <rect x="4" y="0" width="4" height="4" fill="#533483"/>
    <rect x="8" y="0" width="4" height="4" fill="#533483"/>
    <rect x="0" y="4" width="4" height="4" fill="#533483"/>
    <rect x="4" y="4" width="4" height="4" fill="#b13e53"/>
    <rect x="8" y="4" width="4" height="4" fill="#e94560"/>
    <rect x="12" y="4" width="4" height="4" fill="#533483"/>
    <rect x="0" y="8" width="4" height="4" fill="#533483"/>
    <rect x="4" y="8" width="4" height="4" fill="#e94560"/>
    <rect x="8" y="8" width="4" height="4" fill="#b13e53"/>
    <rect x="12" y="8" width="4" height="4" fill="#533483"/>
    <rect x="4" y="12" width="4" height="4" fill="#533483"/>
    <rect x="8" y="12" width="4" height="4" fill="#533483"/>
  </g>

  <!-- Main title -->
  <text x="400" y="115" text-anchor="middle" class="title">IVAN KENT</text>
  <text x="400" y="150" text-anchor="middle" class="title">CUSTODIO</text>
  
  <!-- Decorative line -->
  <rect x="200" y="165" width="400" height="2" fill="#533483"/>
  <rect x="250" y="169" width="300" height="2" fill="#e94560"/>
  
  <!-- Subtitle -->
  <text x="400" y="195" text-anchor="middle" class="subtitle">COMPUTER ENGINEERING // IoT // AI // WEB DEV</text>
  
  <!-- Blinking cursor -->
  <rect x="400" y="210" width="8" height="2" fill="#00ff41" class="blink"/>

  <!-- Small pixel explosions/particles -->
  <rect x="150" y="140" width="2" height="2" fill="#ef7d57" class="twinkle2"/>
  <rect x="155" y="137" width="2" height="2" fill="#ffcd75" class="twinkle1"/>
  <rect x="640" y="135" width="2" height="2" fill="#ef7d57" class="twinkle3"/>
  <rect x="645" y="140" width="2" height="2" fill="#ffcd75" class="twinkle2"/>
</svg>
