<svg xmlns="http://www.w3.org/2000/svg" width="800" height="260" viewBox="0 0 800 260" shape-rendering="crispEdges">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
      .heading { font-family: 'Press Start 2P', monospace; font-size: 13px; fill: #ffcd75; }
      .quest-title { font-family: 'Press Start 2P', monospace; font-size: 10px; fill: #00ff41; }
      .quest-item { font-family: 'Press Start 2P', monospace; font-size: 8px; fill: #c9d1d9; }
      .quest-meta-label { font-family: 'Press Start 2P', monospace; font-size: 8px; fill: #533483; }
      .quest-meta-val { font-family: 'Press Start 2P', monospace; font-size: 8px; fill: #e94560; }
      .xp { font-family: 'Press Start 2P', monospace; font-size: 10px; fill: #ffcd75; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
      @keyframes fill-bar { 0%{width:0} 100%{width:20px} }
      .pulse { animation: pulse 1.5s infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="260" fill="#0d1117"/>
  
  <!-- Outer pixel border -->
  <rect x="20" y="10" width="760" height="240" fill="none" stroke="#533483" stroke-width="4"/>
  <rect x="24" y="14" width="752" height="232" fill="none" stroke="#1a1a2e" stroke-width="2"/>
  <rect x="28" y="18" width="744" height="224" fill="none" stroke="#e94560" stroke-width="2"/>
  
  <!-- Inner -->
  <rect x="30" y="20" width="740" height="220" fill="#0a0e17" opacity="0.8"/>
  
  <!-- Header bar -->
  <rect x="30" y="20" width="740" height="28" fill="#1a1a2e"/>
  <rect x="30" y="48" width="740" height="2" fill="#e94560"/>
  
  <!-- Pixel scroll/quest icon -->
  <g transform="translate(50, 24)">
    <rect x="4" y="0" width="12" height="4" fill="#ffcd75"/>
    <rect x="0" y="4" width="4" height="4" fill="#ffcd75"/>
    <rect x="4" y="4" width="12" height="4" fill="#ef7d57"/>
    <rect x="16" y="4" width="4" height="4" fill="#ffcd75"/>
    <rect x="0" y="8" width="4" height="4" fill="#ffcd75"/>
    <rect x="4" y="8" width="12" height="4" fill="#ef7d57"/>
    <rect x="16" y="8" width="4" height="4" fill="#ffcd75"/>
    <rect x="4" y="12" width="12" height="4" fill="#ffcd75"/>
  </g>
  
  <text x="86" y="40" class="heading">ACTIVE QUEST</text>
  
  <!-- Decorative pixels -->
  <rect x="720" y="28" width="6" height="6" fill="#e94560" class="pulse"/>
  <rect x="732" y="28" width="6" height="6" fill="#00ff41"/>
  <rect x="744" y="28" width="6" height="6" fill="#ffcd75"/>
  
  <!-- Quest title -->
  <text x="60" y="80" class="quest-title">MISSION: Learn AI Automation</text>
  
  <!-- Separator -->
  <rect x="60" y="90" width="300" height="1" fill="#533483"/>
  
  <!-- Quest objectives with pixel checkboxes -->
  <rect x="60" y="107" width="10" height="10" fill="none" stroke="#533483" stroke-width="2"/>
  <text x="80" y="116" class="quest-item">Build smart workflows with Make.com + OpenAI</text>
  
  <rect x="60" y="130" width="10" height="10" fill="none" stroke="#533483" stroke-width="2"/>
  <text x="80" y="139" class="quest-item">Master prompt engineering</text>
  
  <rect x="60" y="153" width="10" height="10" fill="none" stroke="#533483" stroke-width="2"/>
  <text x="80" y="162" class="quest-item">Automate business processes with AI</text>
  
  <!-- Stats panel on right -->
  <rect x="530" y="65" width="220" height="160" fill="#0f1923" stroke="#1a1a2e" stroke-width="2"/>
  
  <!-- Difficulty -->
  <text x="545" y="90" class="quest-meta-label">DIFFICULTY</text>
  <rect x="545" y="97" width="14" height="10" fill="#e94560"/>
  <rect x="563" y="97" width="14" height="10" fill="#e94560"/>
  <rect x="581" y="97" width="14" height="10" fill="#e94560"/>
  <rect x="599" y="97" width="14" height="10" fill="#e94560"/>
  <rect x="617" y="97" width="14" height="10" fill="#e94560" class="pulse"/>
  <rect x="635" y="97" width="14" height="10" fill="#1a1a2e" stroke="#533483" stroke-width="1"/>
  <text x="660" y="106" class="quest-meta-val">HARD</text>
  
  <!-- Progress bar -->
  <text x="545" y="130" class="quest-meta-label">PROGRESS</text>
  <rect x="545" y="137" width="150" height="14" fill="#1a1a2e" stroke="#533483" stroke-width="2"/>
  <rect x="547" y="139" width="20" height="10" fill="#00ff41"/>
  <text x="705" y="149" class="quest-meta-val">10%</text>
  
  <!-- XP Reward -->
  <text x="545" y="175" class="quest-meta-label">REWARD</text>
  
  <!-- Pixel coin -->
  <rect x="549" y="182" width="4" height="4" fill="#ffcd75"/>
  <rect x="545" y="186" width="4" height="4" fill="#ffcd75"/>
  <rect x="549" y="186" width="4" height="4" fill="#ef7d57"/>
  <rect x="553" y="186" width="4" height="4" fill="#ffcd75"/>
  <rect x="545" y="190" width="4" height="4" fill="#ffcd75"/>
  <rect x="549" y="190" width="4" height="4" fill="#ef7d57"/>
  <rect x="553" y="190" width="4" height="4" fill="#ffcd75"/>
  <rect x="549" y="194" width="4" height="4" fill="#ffcd75"/>
  
  <text x="565" y="195" class="xp">+9999 XP</text>
  
  <!-- Pixel potion decoration -->
  <rect x="645" y="180" width="8" height="4" fill="#73eff7"/>
  <rect x="643" y="184" width="12" height="4" fill="#73eff7"/>
  <rect x="643" y="188" width="12" height="4" fill="#00ff41"/>
  <rect x="643" y="192" width="12" height="4" fill="#00ff41"/>
  <rect x="645" y="196" width="8" height="4" fill="#00ff41"/>
  <text x="660" y="195" class="quest-meta-label">+1UP</text>
</svg>
