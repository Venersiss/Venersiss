<svg xmlns="http://www.w3.org/2000/svg" width="800" height="260" viewBox="0 0 800 260" shape-rendering="crispEdges">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
      .heading { font-family: 'Press Start 2P', monospace; font-size: 13px; }
      .quest-title { font-family: 'Press Start 2P', monospace; font-size: 10px; }
      .quest-item { font-family: 'Press Start 2P', monospace; font-size: 8px; fill: #c9d1d9; }
      .quest-meta-label { font-family: 'Press Start 2P', monospace; font-size: 8px; fill: #533483; }
      .quest-meta-val { font-family: 'Press Start 2P', monospace; font-size: 8px; }
      .xp { font-family: 'Press Start 2P', monospace; font-size: 10px; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
      @keyframes glow-gold { 0%,100%{fill:#ffcd75} 50%{fill:#ef7d57} }
      @keyframes glow-green { 0%,100%{fill:#00ff41} 50%{fill:#73eff7} }
      @keyframes glow-red { 0%,100%{fill:#e94560} 50%{fill:#ef7d57} }
      @keyframes rainbow { 0%{fill:#e94560} 25%{fill:#ffcd75} 50%{fill:#00ff41} 75%{fill:#73eff7} 100%{fill:#e94560} }
      @keyframes bounce-xp { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
      .pulse { animation: pulse 1.5s infinite; }
      .glow-gold { animation: glow-gold 2.5s infinite; }
      .glow-green { animation: glow-green 3s infinite; }
      .glow-red { animation: glow-red 2s infinite; }
      .rainbow { animation: rainbow 3s linear infinite; }
      .bounce { animation: bounce-xp 1s infinite; }
    </style>
  </defs>
  <rect width="800" height="260" fill="#0d1117"/>
  <rect x="20" y="10" width="760" height="240" fill="none" stroke="#533483" stroke-width="4"/>
  <rect x="24" y="14" width="752" height="232" fill="none" stroke="#1a1a2e" stroke-width="2"/>
  <rect x="28" y="18" width="744" height="224" fill="none" stroke="#e94560" stroke-width="2"/>
  <rect x="30" y="20" width="740" height="220" fill="#0a0e17" opacity="0.8"/>
  <rect x="30" y="20" width="740" height="28" fill="#1a1a2e"/>
  <rect x="30" y="48" width="740" height="2" fill="#e94560"/>
  <!-- Pixel scroll -->
  <g transform="translate(50, 24)">
    <rect x="4" y="0" width="12" height="4" fill="#ffcd75"/><rect x="0" y="4" width="4" height="4" fill="#ffcd75"/><rect x="4" y="4" width="12" height="4" fill="#ef7d57"/><rect x="16" y="4" width="4" height="4" fill="#ffcd75"/><rect x="0" y="8" width="4" height="4" fill="#ffcd75"/><rect x="4" y="8" width="12" height="4" fill="#ef7d57"/><rect x="16" y="8" width="4" height="4" fill="#ffcd75"/><rect x="4" y="12" width="12" height="4" fill="#ffcd75"/>
  </g>
  <text x="86" y="40" class="heading glow-gold">ACTIVE QUEST</text>
  <rect x="720" y="28" width="6" height="6" fill="#e94560" class="pulse"/><rect x="732" y="28" width="6" height="6" fill="#00ff41"/><rect x="744" y="28" width="6" height="6" fill="#ffcd75"/>
  <text x="60" y="80" class="quest-title glow-green">MISSION: Learn AI Automation</text>
  <rect x="60" y="90" width="300" height="1" fill="#533483"/>
  <!-- Checkboxes -->
  <rect x="60" y="107" width="10" height="10" fill="none" stroke="#533483" stroke-width="2"/>
  <text x="80" y="116" class="quest-item">Build smart workflows with Make.com + OpenAI</text>
  <rect x="60" y="130" width="10" height="10" fill="none" stroke="#533483" stroke-width="2"/>
  <text x="80" y="139" class="quest-item">Master prompt engineering</text>
  <rect x="60" y="153" width="10" height="10" fill="none" stroke="#533483" stroke-width="2"/>
  <text x="80" y="162" class="quest-item">Automate business processes with AI</text>
  <!-- Stats panel -->
  <rect x="530" y="65" width="220" height="160" fill="#0f1923" stroke="#1a1a2e" stroke-width="2"/>
  <text x="545" y="90" class="quest-meta-label">DIFFICULTY</text>
  <rect x="545" y="97" width="14" height="10" fill="#e94560"/><rect x="563" y="97" width="14" height="10" fill="#e94560"/><rect x="581" y="97" width="14" height="10" fill="#e94560"/><rect x="599" y="97" width="14" height="10" fill="#e94560"/><rect x="617" y="97" width="14" height="10" fill="#e94560" class="pulse"/><rect x="635" y="97" width="14" height="10" fill="#1a1a2e" stroke="#533483" stroke-width="1"/>
  <text x="660" y="106" class="quest-meta-val glow-red">HARD</text>
  <text x="545" y="130" class="quest-meta-label">PROGRESS</text>
  <rect x="545" y="137" width="150" height="14" fill="#1a1a2e" stroke="#533483" stroke-width="2"/>
  <rect x="547" y="139" width="20" height="10" fill="#00ff41"/>
  <text x="705" y="149" class="quest-meta-val glow-green">10%</text>
  <text x="545" y="175" class="quest-meta-label">REWARD</text>
  <!-- Pixel coin -->
  <rect x="549" y="182" width="4" height="4" fill="#ffcd75"/><rect x="545" y="186" width="4" height="4" fill="#ffcd75"/><rect x="549" y="186" width="4" height="4" fill="#ef7d57"/><rect x="553" y="186" width="4" height="4" fill="#ffcd75"/><rect x="545" y="190" width="4" height="4" fill="#ffcd75"/><rect x="549" y="190" width="4" height="4" fill="#ef7d57"/><rect x="553" y="190" width="4" height="4" fill="#ffcd75"/><rect x="549" y="194" width="4" height="4" fill="#ffcd75"/>
  <g class="bounce"><text x="565" y="195" class="xp rainbow">+9999 XP</text></g>
  <!-- Pixel potion -->
  <rect x="645" y="180" width="8" height="4" fill="#73eff7"/><rect x="643" y="184" width="12" height="4" fill="#73eff7"/><rect x="643" y="188" width="12" height="4" fill="#00ff41"/><rect x="643" y="192" width="12" height="4" fill="#00ff41"/><rect x="645" y="196" width="8" height="4" fill="#00ff41"/>
  <text x="660" y="195" class="quest-meta-label">+1UP</text>
</svg>
